<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CVGuide{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/cv_app/styles.css" />
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">CVGuide</a>
        <nav class="nav-links">
            <a href="/#features">Features</a>
            <a href="/#how-it-works">How it Works</a>
            <a href="/#faq">FAQ</a>
            <a href="/create/" class="btn btn-small">Start Building</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>© 2026 CVGuide. Built for Quick ATS-friendly CV creation</p>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
